name: Auto-Update Trends Data

on:
  schedule:
    - cron: '0 */1 * * *' # Runs every 1 hour
  workflow_dispatch: # Allows manual trigger click

permissions:
  contents: write # Crucial: Allows the bot to push data.json back to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Requests
      run: pip install requests

    - name: Run Trend Fetcher Script
      run: python fetch_trends.py

    - name: Commit and Push Updated data.json
      run: |
        git config --global user.name 'timbibat'
        git config --global user.email 'timothybibat654@gmail.com'
        git add data.json data/data.json
        git commit -m "Auto-update trends data" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git